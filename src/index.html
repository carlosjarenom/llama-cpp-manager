<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>llama.cpp Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🦙 llama.cpp Manager</h1>
    <div id="status-bar">Conectando…</div>
  </header>

  <main>
    <section id="model-cards"></section>

    <section id="log-section" class="hidden">
      <div class="log-header">
        <h2 id="log-title">📋 Logs</h2>
        <div class="log-actions">
          <button id="log-refresh" class="btn-sm">↻ Refrescar</button>
          <button id="log-close" class="btn-sm btn-close">✕</button>
        </div>
      </div>
      <pre id="log-output"></pre>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
